  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="260" cy="120" r="320" fill="url(#g1)" filter="url(#soft)"/>
  <circle cx="980" cy="200" r="360" fill="url(#g2)" filter="url(#soft)"/>

  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" fill="#ffffff">
    <text x="90" y="290" font-size="72" font-weight="700">Rodrigo Angel Collazo</text>
    <text x="90" y="360" font-size="38" fill="rgba(255,255,255,0.80)">ML Engineer - Buenos Aires, Argentina</text>
    <text x="90" y="430" font-size="28" fill="rgba(255,255,255,0.72)">Machine learning - Physics-inspired computation - Environmental tech</text>
    <text x="90" y="520" font-size="28" fill="rgba(255,255,255,0.70)">github.com/Rodrigoangelcollazo</text>
